<div class="login-container">

  <div class="login-box">
    <h2>REGISTRATION</h2>

    <!-- First Name -->
    <div class="form-group">
      <label>First Name</label>
      <input [(ngModel)]="firstName" placeholder="First Name (Username)">
    </div>

    <!-- Last Name -->
    <div class="form-group">
      <label>Last Name</label>
      <input [(ngModel)]="lastName" placeholder="Enter last name">
    </div>

    <!-- Phone -->
    <div class="form-group">
      <label>Phone</label>
      <input [(ngModel)]="phone"
             placeholder="Enter phone number"
             (blur)="validatePhone()">
    </div>
    <small class="error" *ngIf="phoneError">{{phoneError}}</small>

    <!-- Email -->
    <div class="form-group">
      <label>Email</label>
      <input [(ngModel)]="email"
             placeholder="Enter email (optional)"
             (blur)="validateEmail()">
    </div>
    <small class="error" *ngIf="emailError">{{emailError}}</small>

    <!-- Address -->
    <div class="form-group">
      <label>Address</label>
      <input [(ngModel)]="address" placeholder="Enter address">
    </div>

    <!-- Password -->
    <div class="form-group">
      <label>Password</label>
      <input [(ngModel)]="password"
             type="password"
             placeholder="Enter password">
    </div>

    <!-- Confirm Password -->
    <div class="form-group">
      <label>Confirm</label>
      <input [(ngModel)]="confirmPassword"
             type="password"
             placeholder="Re-enter password"
             (blur)="validatePasswordMatch()">
    </div>
    <small class="error" *ngIf="passwordError">{{passwordError}}</small>

    <!-- Button -->
    <button type="button" (click)="register()">Register</button>

    <!-- Message -->
    <p [ngClass]="status === 'SUCCESS' ? 'success' : 'error'">
      {{message}}
    </p>

    <!-- Bottom Section -->
    <div class="bottom-section">

      <!-- After success -->
      <p *ngIf="status === 'SUCCESS'">
        <span class="link" (click)="goToLogin()">Login now</span>
      </p>

      <!-- Always visible -->
      <p>
        Already registered?
        <span class="link" (click)="goToLogin()">Back to Login</span>
      </p>

    </div>

  </div>

</div>
